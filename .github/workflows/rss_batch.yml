name: RSS Batch and Summarizer

on:
  schedule:
    # 毎週水曜日のみ日本時間の深夜 0:00 に実行 (UTC 火曜 15:00)
    - cron: '0 15 * * TUE'
  workflow_dispatch: # 手動実行用

jobs:
  run-batch:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 変更をコミットするために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x' # go.modのバージョンに合わせる

      - name: Run RSS Fetcher and Summarizer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: go run main.go

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fetched_articles.json summaries/
          
          # 変更がある場合のみコミット
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update RSS summaries and state [skip ci]"
            git push
          else
            echo "No new changes to commit."
          fi
